<html>
  <head>
    <link rel="stylesheet" href="./css/harv.css">
    <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>
    <script src="./components/components.js"></script>
    <script src="./js/constants.js"></script>
    <script src="./js/main.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/data.js"></script>
    <script src="./js/overall.js"></script>
    <script src="./js/player.js"></script>
    <script>
      function launch() {
        launchHarv();
      }
    </script>
    <title id="page-title"></title>
  </head>
  <body onload="launch()">
    <div id="root">
      <div id="notice" class="notice"></div>
      <div id="home">
	<div>
	  <div class="title" id="title"></div>
	  <div class="acronym">
	    <span class="big">H</span>
	    <span class="small">ighly</span>
	    <span class="big">A</span>
	    <span class="small">ccurate</span>
	    <span class="big">R</span>
	    <span class="small">esults</span>
	    <span class="big">V</span>
	    <span class="small">erifier</span>
	  </div>
	</div>
	<div>
	  <div class="header subtitle">Tournaments</div>
	  <ul class="tournament-list" id="tournament-list"></ul>
	</div>
      </div>
      <div id="tournament">
	<div>
	  <div id="tournament-title" class="title"></div>
	  <div id="tournament-info" class="tournament-info"></div>
	</div>
	<div class="tournament-nav-container">
	  <div class="tournament-nav" id="tournament-nav-top"></div>
	  <div class="tournament-nav" id="tournament-nav-bottom"></div>
	</div>
	<div class="player-page-name" id="player-page-name"></div>
	<div class="page-header">
	  <div class="subtitle" id="subtitle"></div>
	  <div class="chooser" id="chooser">
	    <div class="pool-select" id="pool-select-container" style="display:none">
	      <label for="pool-select">Pool:</label>
	      <select name="pool-select" id="pool-select" tabindex=0 ></select>
	    </div>
	    <div class="division-select">
	      <label for="division-select">Division:</label>
	      <select name="division-select" id="division-select" tabindex=0 ></select>
	    </div>
	  </div>
	</div>
	<div id="tournament-players"></div>
	<div id="tournament-results" class="tournament-results"></div>
      </div>
    </div>
  </body>
</html>
